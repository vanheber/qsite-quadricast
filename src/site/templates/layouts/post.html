<!-- Page Header -->
<header class="page-header text-center text-white pt-8 pb-5">
    <div class="container px-4">
        <!-- Categoria Badge -->
        <div class="mb-3">
            <span class="badge bg-primary text-uppercase ls-1">{{category}}</span>
        </div>
        <h1 class="display-4 fw-bold mb-3">{{title}}</h1>
        <div class="text-white-50 fst-italic">
            <span>{{date}}</span> • <span>{{author}}</span>
        </div>
    </div>
</header>

<article class="container pb-5 mt-n3">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Imagem de Capa (Destacada e sobrepondo o header levemente) -->
            <div class="card border-0 shadow-lg mb-5 mt-5 overflow-hidden rounded-3 ratio ratio-1x1">
                {{image_tag}}
            </div>

            <!-- Conteúdo focado em leitura -->
            <div class="blog-content fs-5 lh-lg font-monospace-off text-justify">
                {{body}}
            </div>

            <!-- Social Share -->
            <div class="mt-5 mb-4">
                <h5 class="fw-bold mb-3 text-center">Gostou? Compartilhe:</h5>
                <div class="d-flex justify-content-center gap-2">
                    <!-- Facebook -->
                    <a href="https://www.facebook.com/sharer/sharer.php?u={{encoded_url}}" target="_blank"
                        class="btn btn-outline-primary rounded-circle icon-box-40">
                        <i class="bi bi-facebook"></i>
                    </a>
                    <!-- X (Twitter) -->
                    <a href="https://x.com/intent/tweet?text={{encoded_title}}&url={{encoded_url}}" target="_blank"
                        class="btn btn-outline-dark rounded-circle icon-box-40">
                        <i class="bi bi-twitter-x"></i>
                    </a>
                    <!-- LinkedIn -->
                    <a href="https://www.linkedin.com/shareArticle?mini=true&url={{encoded_url}}&title={{encoded_title}}"
                        target="_blank" class="btn btn-outline-primary rounded-circle icon-box-40">
                        <i class="bi bi-linkedin"></i>
                    </a>
                    <!-- Instagram (Link para perfil) -->
                    <a href="https://instagram.com" target="_blank"
                        class="btn btn-outline-danger rounded-circle icon-box-40" title="Siga-nos no Instagram">
                        <i class="bi bi-instagram"></i>
                    </a>
                    <!-- WhatsApp -->
                    <a href="https://api.whatsapp.com/send?text={{encoded_title}}%20{{encoded_url}}" target="_blank"
                        class="btn btn-outline-success rounded-circle icon-box-40">
                        <i class="bi bi-whatsapp"></i>
                    </a>
                </div>
            </div>

            <hr class="my-5">

            <div class="d-flex justify-content-between align-items-center">
                <a href="{{BASE_URL}}/blog" class="btn btn-link text-decoration-none">← Voltar para o Blog</a>
                <button class="btn btn-outline-dark btn-sm" onclick="window.scrollTo(0,0)">Topo ↑</button>
            </div>
        </div>
    </div>
</article>
